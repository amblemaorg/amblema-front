export default "<div class=\"testimonial-card\">\n  <div class=\"testimonial-data\">\n    <div class=\"testimonial-image\">\n      <img\n        *ngIf=\"testimonial.image\"\n        [src]=\"testimonial.image\"\n        [alt]=\"testimonial.firstName + ' ' + testimonial.lastName + ' image'\"\n      />\n    </div>\n    <div class=\"testimonial-identity\">\n      <p *ngIf=\"testimonial.firstName && testimonial.lastName\" class=\"testimonial-fullname\">\n        {{ testimonial.firstName + ' ' + testimonial.lastName }}\n      </p>\n      <p *ngIf=\"testimonial.function\" class=\"testimonial-role\">\n        {{ testimonial.position ? testimonial.position : testimonial.function }}\n      </p>\n    </div>\n  </div>\n  <div class=\"testimonial-content\">\n    <p *ngIf=\"testimonial.description\" class=\"testimonial-description\">\n      {{ testimonial.description }}\n    </p>\n  </div>\n</div>\n";
