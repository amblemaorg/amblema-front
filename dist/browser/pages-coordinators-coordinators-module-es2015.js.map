export default "<section class=\"cover\">\n  <web-cover [slides]=\"coverData.slides\" [options]=\"coverData.options\" *ngIf=\"coverData.slides\">\n  </web-cover>\n  <h1>Coordinadores</h1>\n  <owl-carousel-o\n    *ngIf=\"coordinatorsPageData.testimonials.length > 0\"\n    [options]=\"customOptions\"\n    class=\"testimonials-carousel\"\n  >\n    <ng-template carouselSlide *ngFor=\"let testimonial of coordinatorsPageData.testimonials\">\n      <web-testimonial-card [testimonial]=\"testimonial\"></web-testimonial-card>\n    </ng-template>\n  </owl-carousel-o>\n</section>\n\n<section class=\"steps\">\n  <web-bg-heading>¿Cómo ser un Coordinador?</web-bg-heading>\n  <div class=\"steps-wrapper\">\n    <ol #stepsList class=\"steps-list fade-in-animation animation-init\">\n      <div class=\"steps-list__divider\">\n        <li *ngFor=\"let step of stepsList1\">\n          {{ step }}\n        </li>\n      </div>\n      <div class=\"steps-list__divider\">\n        <li *ngFor=\"let step of stepsList2\">\n          {{ step }}\n        </li>\n      </div>\n    </ol>\n  </div>\n</section>\n";
