export default "<div class=\"post-card\">\n  <div class=\"image-wrapper\">\n    <img class=\"post-image\" [src]=\"post.mainImage\" [alt]=\"post.title + ' imagen'\" />\n    <span class=\"post-date\">\n      {{ post.date | date: \"mediumDate\":\"-0400\":\"es\" }}\n    </span>\n  </div>\n  <div class=\"post-content\">\n    <h2 #title class=\"post-title\">{{ post.title }}</h2>\n    <p #excerpt class=\"post-excerpt\" [innerHTML]=\"getExcerpt()\"></p>\n    <a class=\"read-more d-flex align-items-center\" [routerLink]=\"['/blog/post', post.slug]\">\n      Leer Más\n    </a>\n  </div>\n</div>\n";
