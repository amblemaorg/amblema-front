export default "<section class=\"blog-post d-flex\">\n  <section class=\"post-detail\">\n    <div>\n      <div class=\"image-wrapper\">\n        <img class=\"post-image\" [src]=\"post.secondaryImage\" />\n        <span class=\"post-date\">\n          {{ post.date | date: \"mediumDate\":\"+0430\":\"es\" }}\n        </span>\n      </div>\n      <div class=\"post\" lang=\"es\">\n        <h1 class=\"post-title\">{{ post.title }}</h1>\n        <p class=\"post-content\" [innerHTML]=\"post.content\"></p>\n      </div>\n    </div>\n    <social-sharing></social-sharing>\n  </section>\n  <aside class=\"sidebar\">\n    <searcher (search)=\"navigateToArchive($event)\"></searcher>\n    <blog-categories-list></blog-categories-list>\n    <recent-posts-list [posts]=\"recentPosts\"></recent-posts-list>\n  </aside>\n</section>";
