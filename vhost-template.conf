server {
  listen       80;
  server_name  127.0.0.1;

  #charset koi8-r;
  #access_log  /var/log/nginx/host.access.log  main;

  root   /home/amblema/dist/browser;
  index  index.html;

  location / {
    # 1. Try to serve the exact URI (files like images, js, css)
    # 2. Try to serve the URI as a directory (finds pre-rendered index.html)
    # 3. Fallback to the main index.html for Angular SPA routing
    try_files $uri $uri/index.html /index.html;
  }

  location ~* \.(woff|eot|ttf|svg|mp4|webm|jpg|jpeg|png|gif|ico|css|js|pdf)$ {
    expires 30d;
  }

  error_page  404 /404.html;

  # redirect server error pages to the static page /50x.html
  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
    root  /home/amblema/dist/browser;
  }
}
